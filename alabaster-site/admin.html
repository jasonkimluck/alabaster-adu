<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>관리자 페이지 — Alabaster ADU 상담 문의 내역</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green: #2d6a4f;
      --green-dark: #1e4d34;
      --navy: #1a2640;
      --gold: #c9a84c;
      --bg: #f4f6f9;
      --white: #ffffff;
      --text: #2d3748;
      --text-light: #718096;
      --border: #e2e8f0;
      --danger: #e53e3e;
      --success: #38a169;
      --radius: 10px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }

    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── Top Bar ── */
    .topbar {
      background: var(--navy);
      color: #fff;
      padding: 0 32px;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 8px rgba(0,0,0,0.25);
    }
    .topbar-brand { display: flex; align-items: center; gap: 12px; }
    .topbar-logo {
      background: var(--green);
      color: #fff;
      width: 36px; height: 36px;
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
    }
    .topbar-title { font-size: 15px; font-weight: 700; }
    .topbar-sub { font-size: 12px; color: rgba(255,255,255,0.6); }
    .topbar-actions { display: flex; align-items: center; gap: 12px; }
    .topbar-badge {
      background: var(--gold);
      color: var(--navy);
      font-size: 11px; font-weight: 700;
      padding: 3px 10px; border-radius: 20px;
    }
    .btn-back {
      background: rgba(255,255,255,0.12);
      color: #fff; border: none;
      padding: 6px 14px; border-radius: 6px;
      font-size: 13px; cursor: pointer;
      text-decoration: none;
      display: flex; align-items: center; gap: 6px;
      transition: background 0.2s;
    }
    .btn-back:hover { background: rgba(255,255,255,0.22); }

    /* ── Layout ── */
    .page-wrap {
      max-width: 1320px;
      margin: 0 auto;
      padding: 32px 24px 60px;
    }

    /* ── Stats ── */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      margin-bottom: 28px;
    }
    .stat-card {
      background: var(--white);
      border-radius: var(--radius);
      padding: 20px 24px;
      box-shadow: var(--shadow);
      display: flex; align-items: center; gap: 16px;
    }
    .stat-icon {
      width: 48px; height: 48px; border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; flex-shrink: 0;
    }
    .stat-icon.green  { background: #e8f5ee; color: var(--green); }
    .stat-icon.gold   { background: #fdf5e6; color: #b8860b; }
    .stat-icon.navy   { background: #edf0f7; color: var(--navy); }
    .stat-icon.orange { background: #fff3e6; color: #d97706; }
    .stat-value { font-size: 26px; font-weight: 700; color: var(--text); line-height: 1; }
    .stat-label { font-size: 12px; color: var(--text-light); margin-top: 4px; }

    /* ── Toolbar ── */
    .toolbar {
      background: var(--white);
      border-radius: var(--radius);
      padding: 16px 20px;
      box-shadow: var(--shadow);
      display: flex; align-items: center; gap: 12px;
      flex-wrap: wrap; margin-bottom: 20px;
    }
    .toolbar-left { display: flex; align-items: center; gap: 10px; flex: 1; }
    .search-box { position: relative; flex: 1; max-width: 320px; }
    .search-box i { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--text-light); font-size: 13px; }
    .search-box input {
      width: 100%;
      padding: 9px 12px 9px 36px;
      border: 1px solid var(--border);
      border-radius: 8px; font-size: 13px;
      font-family: inherit; outline: none;
      transition: border-color 0.2s;
    }
    .search-box input:focus { border-color: var(--green); }
    .filter-select {
      padding: 9px 12px;
      border: 1px solid var(--border);
      border-radius: 8px; font-size: 13px;
      font-family: inherit; outline: none;
      background: #fff; cursor: pointer;
    }
    .filter-select:focus { border-color: var(--green); }
    .toolbar-right { display: flex; align-items: center; gap: 10px; }
    .btn {
      padding: 9px 16px; border-radius: 8px;
      font-size: 13px; font-family: inherit; font-weight: 600;
      border: none; cursor: pointer;
      display: flex; align-items: center; gap: 6px;
      transition: all 0.2s;
    }
    .btn-primary { background: var(--green); color: #fff; }
    .btn-primary:hover { background: var(--green-dark); }
    .btn-outline { background: transparent; color: var(--green); border: 1.5px solid var(--green); }
    .btn-outline:hover { background: #e8f5ee; }
    .btn-gold { background: var(--gold); color: #fff; border: none; }
    .btn-gold:hover { background: #b8953f; }
    .btn-gold:disabled { opacity: 0.6; cursor: not-allowed; }

    /* ── Table Card ── */
    .table-card {
      background: var(--white);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
    }
    .table-head-bar {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
    }
    .table-head-bar h2 { font-size: 15px; font-weight: 700; display: flex; align-items: center; gap: 8px; }
    .table-count { font-size: 12px; color: var(--text-light); font-weight: 400; }

    .table-wrapper { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    thead th {
      background: #f8fafc;
      padding: 12px 14px;
      text-align: left;
      font-size: 11px; font-weight: 700;
      color: var(--text-light);
      text-transform: uppercase; letter-spacing: 0.05em;
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
      cursor: pointer; user-select: none;
    }
    thead th:hover { background: #edf0f7; color: var(--text); }
    thead th .sort-icon { margin-left: 4px; opacity: 0.4; }
    thead th.sorted .sort-icon { opacity: 1; color: var(--green); }

    tbody tr { border-bottom: 1px solid var(--border); transition: background 0.15s; }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: #f8fafc; }
    td { padding: 13px 14px; vertical-align: middle; }
    td.td-name { font-weight: 600; white-space: nowrap; }
    td.td-contact { color: var(--text-light); font-size: 12px; }
    td.td-contact a { color: var(--green); text-decoration: none; }
    td.td-contact a:hover { text-decoration: underline; }
    td.td-addr { max-width: 180px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--text-light); font-size: 12px; }
    td.td-msg { max-width: 200px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--text-light); font-size: 12px; }
    td.td-date { white-space: nowrap; font-size: 12px; color: var(--text-light); }
    td.td-actions { white-space: nowrap; }

    .badge {
      display: inline-block; padding: 3px 9px;
      border-radius: 20px; font-size: 11px; font-weight: 600;
    }
    .badge-adu-detached      { background: #e8f5ee; color: #276749; }
    .badge-adu-attached      { background: #e6efff; color: #2b4db0; }
    .badge-adu-garage        { background: #fdf5e6; color: #9a6700; }
    .badge-adu-basement      { background: #f0e6ff; color: #6b2d9a; }
    .badge-adu-above-garage  { background: #e6f7ff; color: #0070a0; }
    .badge-adu-addition      { background: #fff0e6; color: #a03800; }
    .badge-adu-unknown       { background: #f0f0f0; color: #555; }
    .badge-budget            { background: #edf0f7; color: var(--navy); }
    .badge-fin-yes           { background: #e8f5ee; color: #276749; }
    .badge-fin-no            { background: #fee; color: #9a3030; }
    .badge-fin-unk           { background: #f0f0f0; color: #555; }

    /* ── Empty / Loading ── */
    .empty-state, .loading-state {
      text-align: center; padding: 80px 20px; color: var(--text-light);
    }
    .empty-state i { font-size: 48px; margin-bottom: 16px; display: block; opacity: 0.3; }
    .loading-state i { font-size: 32px; color: var(--green); }
    .empty-state p, .loading-state p { font-size: 15px; margin-top: 12px; }

    /* ── Pagination ── */
    .pagination {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 20px; border-top: 1px solid var(--border); font-size: 13px;
    }
    .page-info { color: var(--text-light); }
    .page-btns { display: flex; gap: 6px; }
    .page-btn {
      padding: 6px 12px; border: 1px solid var(--border);
      background: var(--white); border-radius: 6px;
      font-size: 13px; cursor: pointer; font-family: inherit;
      transition: all 0.2s;
    }
    .page-btn:hover:not(:disabled) { border-color: var(--green); color: var(--green); }
    .page-btn.active { background: var(--green); color: #fff; border-color: var(--green); }
    .page-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* ── Detail Modal ── */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.5);
      display: flex; align-items: center; justify-content: center;
      z-index: 200; padding: 20px;
      opacity: 0; visibility: hidden; transition: all 0.25s;
    }
    .modal-overlay.open { opacity: 1; visibility: visible; }
    .modal-box {
      background: var(--white); border-radius: 14px;
      padding: 32px; max-width: 600px; width: 100%;
      max-height: 90vh; overflow-y: auto;
      transform: translateY(20px); transition: transform 0.25s;
    }
    .modal-overlay.open .modal-box { transform: translateY(0); }
    .modal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; }
    .modal-header h3 { font-size: 18px; font-weight: 700; }
    .modal-close { background: none; border: none; font-size: 20px; cursor: pointer; color: var(--text-light); padding: 4px; }
    .modal-close:hover { color: var(--text); }
    .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .detail-item.full { grid-column: 1/-1; }
    .detail-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-light); margin-bottom: 4px; }
    .detail-value { font-size: 14px; font-weight: 500; word-break: break-all; }
    .detail-value a { color: var(--green); text-decoration: none; }
    .detail-value a:hover { text-decoration: underline; }
    .detail-msg {
      background: #f8fafc; border-radius: 8px;
      padding: 12px 16px; font-size: 14px;
      color: var(--text); line-height: 1.6;
      min-height: 80px; white-space: pre-wrap;
    }
    .modal-footer { margin-top: 24px; display: flex; justify-content: flex-end; gap: 10px; }
    .btn-danger-outline { background: transparent; color: var(--danger); border: 1.5px solid var(--danger); }
    .btn-danger-outline:hover { background: #fee; }

    /* ── Toast ── */
    .toast {
      position: fixed; bottom: 30px; right: 30px;
      background: var(--green-dark); color: #fff;
      padding: 12px 20px; border-radius: 10px;
      font-size: 14px; box-shadow: 0 4px 20px rgba(0,0,0,0.2);
      z-index: 300; transform: translateY(20px); opacity: 0; transition: all 0.3s;
    }
    .toast.show { transform: translateY(0); opacity: 1; }

    /* ── Login Screen ── */
    .login-screen {
      position: fixed; inset: 0;
      background: linear-gradient(135deg, #1a2640 0%, #1e4d34 100%);
      display: flex; align-items: center; justify-content: center;
      z-index: 9999;
      padding: 20px;
    }
    .login-screen.hidden { display: none; }
    .login-box {
      background: #fff;
      border-radius: 16px;
      padding: 48px 40px 40px;
      width: 100%; max-width: 400px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.35);
      text-align: center;
    }
    .login-logo {
      width: 60px; height: 60px;
      background: linear-gradient(135deg, #2d6a4f, #1a2640);
      border-radius: 16px;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 20px;
      font-size: 28px; color: #fff;
    }
    .login-title { font-size: 22px; font-weight: 700; color: #1a2640; margin-bottom: 6px; }
    .login-sub { font-size: 13px; color: #718096; margin-bottom: 32px; }
    .login-field { margin-bottom: 16px; text-align: left; }
    .login-label { display: block; font-size: 12px; font-weight: 700; color: #4a5568; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.05em; }
    .login-input {
      width: 100%; padding: 12px 16px;
      border: 1.5px solid #e2e8f0;
      border-radius: 8px; font-size: 14px;
      font-family: inherit; outline: none;
      transition: border-color 0.2s;
    }
    .login-input:focus { border-color: #2d6a4f; }
    .login-btn {
      width: 100%; padding: 13px;
      background: linear-gradient(135deg, #2d6a4f, #1e4d34);
      color: #fff; border: none; border-radius: 8px;
      font-size: 15px; font-weight: 700; font-family: inherit;
      cursor: pointer; margin-top: 8px;
      transition: opacity 0.2s;
    }
    .login-btn:hover { opacity: 0.9; }
    .login-error {
      background: #fee; color: #c53030;
      border: 1px solid #fcc;
      border-radius: 8px; padding: 10px 14px;
      font-size: 13px; margin-top: 14px;
      display: none;
    }
    .login-error.show { display: block; }

    /* ── Responsive ── */
    @media (max-width: 900px) {
      .stats-row { grid-template-columns: repeat(2, 1fr); }
      .detail-grid { grid-template-columns: 1fr; }
    }
    @media (max-width: 600px) {
      .stats-row { grid-template-columns: 1fr 1fr; gap: 10px; }
      .topbar { padding: 0 16px; }
      .page-wrap { padding: 16px 12px 60px; }
      .toolbar { flex-direction: column; align-items: stretch; }
      .toolbar-left, .toolbar-right { flex-wrap: wrap; }
      .search-box { max-width: 100%; }
    }
  </style>
</head>
<body>

<!-- Login Screen -->
<div class="login-screen" id="loginScreen">
  <div class="login-box">
    <div class="login-logo"><i class="fa-solid fa-house-chimney"></i></div>
    <div class="login-title">Alabaster ADU</div>
    <div class="login-sub">관리자 페이지 로그인</div>
    <form id="loginForm" onsubmit="event.preventDefault(); doLogin();">
    <div class="login-field">
      <label class="login-label" for="loginId">아이디</label>
      <input type="text" id="loginId" class="login-input" placeholder="아이디를 입력하세요" autocomplete="username" />
    </div>
    <div class="login-field">
      <label class="login-label" for="loginPw">비밀번호</label>
      <input type="password" id="loginPw" class="login-input" placeholder="비밀번호를 입력하세요" autocomplete="current-password" />
    </div>
    <button type="submit" class="login-btn" id="loginBtn"><i class="fa-solid fa-right-to-bracket" style="margin-right:8px"></i>로그인</button>
    </form>
    <div class="login-error" id="loginError">아이디 또는 비밀번호가 올바르지 않습니다.</div>
  </div>
</div>

<!-- Top Bar -->
<div class="topbar">
  <div class="topbar-brand">
    <div class="topbar-logo"><i class="fa-solid fa-house-chimney"></i></div>
    <div>
      <div class="topbar-title">Alabaster ADU — 관리자</div>
      <div class="topbar-sub">상담 문의 내역 조회</div>
    </div>
  </div>
  <div class="topbar-actions">
    <span class="topbar-badge">ADMIN</span>
    <a href="index.html" class="btn-back"><i class="fa-solid fa-arrow-left"></i> 사이트로 돌아가기</a>
    <button class="btn-back" onclick="doLogout()" style="background:rgba(229,62,62,0.2);border:1px solid rgba(229,62,62,0.4);"><i class="fa-solid fa-right-from-bracket"></i> 로그아웃</button>
  </div>
</div>

<!-- Page -->
<div class="page-wrap">

  <!-- Stats -->
  <div class="stats-row">
    <div class="stat-card">
      <div class="stat-icon green"><i class="fa-solid fa-inbox"></i></div>
      <div>
        <div class="stat-value" id="statTotal">—</div>
        <div class="stat-label">전체 문의</div>
      </div>
    </div>
    <div class="stat-card">
      <div class="stat-icon gold"><i class="fa-solid fa-calendar-day"></i></div>
      <div>
        <div class="stat-value" id="statToday">—</div>
        <div class="stat-label">오늘 접수</div>
      </div>
    </div>
    <div class="stat-card">
      <div class="stat-icon navy"><i class="fa-solid fa-coins"></i></div>
      <div>
        <div class="stat-value" id="statFinancing">—</div>
        <div class="stat-label">융자 관심</div>
      </div>
    </div>
    <div class="stat-card">
      <div class="stat-icon orange"><i class="fa-solid fa-house-flag"></i></div>
      <div>
        <div class="stat-value" id="statTopType">—</div>
        <div class="stat-label">가장 많은 유형</div>
      </div>
    </div>
  </div>

  <!-- Toolbar -->
  <div class="toolbar">
    <div class="toolbar-left">
      <div class="search-box">
        <i class="fa-solid fa-magnifying-glass"></i>
        <input type="text" id="searchInput" placeholder="이름, 이메일, 주소 검색..." />
      </div>
      <select class="filter-select" id="filterAduType">
        <option value="">모든 ADU 유형</option>
        <option value="detached">독립 별채</option>
        <option value="attached">부속 증축형</option>
        <option value="garage">차고 전환</option>
        <option value="basement">지하층 전환</option>
        <option value="above-garage">차고 위층</option>
        <option value="addition">홈 어디션</option>
        <option value="unknown">미정</option>
      </select>
      <select class="filter-select" id="filterFinancing">
        <option value="">융자 여부 전체</option>
        <option value="yes">관심 있음</option>
        <option value="no">자가 자금</option>
        <option value="unknown">미정</option>
      </select>
    </div>
    <div class="toolbar-right">
      <button class="btn btn-outline" id="refreshBtn"><i class="fa-solid fa-rotate-right"></i> 새로고침</button>
      <button class="btn btn-primary" id="exportBtn"><i class="fa-solid fa-file-csv"></i> 현재 목록 CSV</button>
      <button class="btn btn-gold" id="exportAllBtn"><i class="fa-solid fa-database"></i> 전체 DB 다운로드</button>
    </div>
  </div>

  <!-- Table Card -->
  <div class="table-card">
    <div class="table-head-bar">
      <h2>
        <i class="fa-solid fa-table-list" style="color:var(--green)"></i>
        상담 문의 목록
        <span class="table-count" id="tableCount"></span>
      </h2>
      <span id="lastUpdated" style="font-size:12px;color:var(--text-light);"></span>
    </div>

    <div class="table-wrapper">
      <table id="dataTable">
        <thead>
          <tr>
            <th style="width:48px;">#</th>
            <th data-col="submittedAt">접수일시 <i class="fa-solid fa-sort sort-icon"></i></th>
            <th data-col="name">이름 <i class="fa-solid fa-sort sort-icon"></i></th>
            <th>연락처</th>
            <th>이메일</th>
            <th>부지 주소</th>
            <th data-col="aduType">ADU 유형 <i class="fa-solid fa-sort sort-icon"></i></th>
            <th>예산</th>
            <th>융자</th>
            <th>메모</th>
            <th style="width:80px;text-align:center;">상세</th>
          </tr>
        </thead>
        <tbody id="tableBody">
          <tr>
            <td colspan="11">
              <div class="loading-state">
                <i class="fa-solid fa-spinner fa-spin"></i>
                <p>불러오는 중...</p>
              </div>
            </td>
          </tr>
        </tbody>
      </table>
    </div>

    <div class="pagination" id="pagination" style="display:none;">
      <div class="page-info" id="pageInfo"></div>
      <div class="page-btns" id="pageBtns"></div>
    </div>
  </div>

</div><!-- /page-wrap -->

<!-- Detail Modal -->
<div class="modal-overlay" id="detailModal">
  <div class="modal-box">
    <div class="modal-header">
      <h3><i class="fa-solid fa-user-circle" style="color:var(--green);margin-right:8px;"></i>상담 문의 상세</h3>
      <button class="modal-close" id="modalClose"><i class="fa-solid fa-xmark"></i></button>
    </div>
    <div class="detail-grid" id="detailContent"></div>
    <div class="modal-footer">
      <button class="btn btn-danger-outline" id="modalDeleteBtn" disabled title="Google Sheets 읽기 전용 관리자입니다.">
        <i class="fa-solid fa-lock"></i> 읽기 전용
      </button>
      <button class="btn btn-primary" id="modalCloseBtn">닫기</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
// ── Config ──
const GOOGLE_APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxwmI7HS4tp2l9BGo9HlXwTsePus2w6eAYPWnjhR7xAxzziJHLk3tGjPLsByWk9brIALw/exec';
const PAGE_LIMIT = 15;
const PACIFIC_TIME_ZONE = 'America/Los_Angeles';

// ── State ──
let allRecords = [];
let filteredRecords = [];
let currentPage = 1;
let sortCol = 'submittedAt';
let sortDir = -1; // -1=desc, 1=asc
let activeRecordId = null;

// ── Labels ──
const aduLabels = {
  detached: '독립 별채', attached: '부속 증축형', garage: '차고 전환',
  basement: '지하층 전환', 'above-garage': '차고 위층', addition: '홈 어디션',
  unknown: '미정', '': '—'
};
const budgetLabels = {
  'under-150k': '$150K 이하', '150-300k': '$150K–300K',
  '300-500k': '$300K–500K', 'over-500k': '$500K 이상',
  unknown: '미정', '': '—'
};
const finLabels = { yes: '관심 있음', no: '자가 자금', unknown: '미정', '': '—' };

// ── Fetch All Records ──
async function fetchAll() {
  try {
    const json = await fetchRecordsFromAppsScript();
    if (!json || !json.success) throw new Error((json && json.error) || 'API error');
    allRecords = (json.data || []).filter(r => !r.deleted);
    applyFilters();
    updateStats();
    updateLastUpdated();
  } catch (e) {
    console.error(e);
    document.getElementById('tableBody').innerHTML =
      `<tr><td colspan="11"><div class="empty-state"><i class="fa-solid fa-circle-exclamation"></i><p>데이터를 불러오지 못했습니다. 잠시 후 새로고침하세요.</p></div></td></tr>`;
  }
}

function fetchRecordsFromAppsScript() {
  return new Promise((resolve, reject) => {
    const callbackName = `alabasterAdminCallback_${Date.now()}_${Math.floor(Math.random() * 1000)}`;
    const script = document.createElement('script');
    const cleanup = () => {
      delete window[callbackName];
      if (script.parentNode) script.parentNode.removeChild(script);
    };

    const timer = setTimeout(() => {
      cleanup();
      reject(new Error('Apps Script request timed out'));
    }, 15000);

    window[callbackName] = (payload) => {
      clearTimeout(timer);
      cleanup();
      resolve(payload);
    };

    script.onerror = () => {
      clearTimeout(timer);
      cleanup();
      reject(new Error('Apps Script request failed'));
    };

    const url = new URL(GOOGLE_APPS_SCRIPT_URL);
    url.searchParams.set('action', 'list');
    url.searchParams.set('callback', callbackName);
    url.searchParams.set('_ts', Date.now().toString());
    script.src = url.toString();
    document.body.appendChild(script);
  });
}

// ── Filters & Sort ──
function applyFilters() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const aduFilter = document.getElementById('filterAduType').value;
  const finFilter = document.getElementById('filterFinancing').value;

  filteredRecords = allRecords.filter(r => {
    const matchQ = !q || [r.name, r.email, r.address, r.phone]
      .some(v => (v || '').toLowerCase().includes(q));
    const matchAdu = !aduFilter || r.aduType === aduFilter;
    const matchFin = !finFilter || r.financing === finFilter;
    return matchQ && matchAdu && matchFin;
  });

  // Sort
  filteredRecords.sort((a, b) => {
    let va = a[sortCol] || '', vb = b[sortCol] || '';
    if (sortCol === 'submittedAt') {
      va = va ? new Date(va).getTime() : (a.created_at || 0);
      vb = vb ? new Date(vb).getTime() : (b.created_at || 0);
    }
    if (va < vb) return -sortDir;
    if (va > vb) return sortDir;
    return 0;
  });

  currentPage = 1;
  renderTable();
  updateTableCount();
}

// ── Render Table ──
function renderTable() {
  const tbody = document.getElementById('tableBody');
  const start = (currentPage - 1) * PAGE_LIMIT;
  const rows = filteredRecords.slice(start, start + PAGE_LIMIT);

  if (filteredRecords.length === 0) {
    tbody.innerHTML = `<tr><td colspan="11"><div class="empty-state">
      <i class="fa-regular fa-folder-open"></i>
      <p>접수된 상담 문의가 없습니다.</p>
    </div></td></tr>`;
    document.getElementById('pagination').style.display = 'none';
    return;
  }

  tbody.innerHTML = rows.map((r, i) => {
    const no = start + i + 1;
    const dt = getDisplayDate(r);
    const aduKey = r.aduType || 'unknown';
    const aduBadge = `<span class="badge badge-adu-${aduKey}">${aduLabels[aduKey] || aduKey}</span>`;
    const budgBadge = r.budget
      ? `<span class="badge badge-budget">${budgetLabels[r.budget] || r.budget}</span>`
      : '<span style="color:#aaa">—</span>';
    const finCls = r.financing === 'yes' ? 'fin-yes' : r.financing === 'no' ? 'fin-no' : 'fin-unk';
    const finBadge = `<span class="badge badge-${finCls}">${finLabels[r.financing || ''] || '—'}</span>`;
    const msgRaw = (r.message || '').replace(/<[^>]*>/g, '');
    const msgPreview = msgRaw.length > 30 ? msgRaw.substring(0, 30) + '…' : (msgRaw || '—');

    return `<tr>
      <td style="color:var(--text-light);font-size:12px;">${no}</td>
      <td class="td-date">${dt}</td>
      <td class="td-name">${esc(r.name || '—')}</td>
      <td class="td-contact"><a href="tel:${esc(r.phone || '')}">${esc(r.phone || '—')}</a></td>
      <td class="td-contact"><a href="mailto:${esc(r.email || '')}">${esc(r.email || '—')}</a></td>
      <td class="td-addr" title="${esc(r.address || '')}">${esc(r.address || '—')}</td>
      <td>${aduBadge}</td>
      <td>${budgBadge}</td>
      <td>${finBadge}</td>
      <td class="td-msg" title="${esc(msgRaw)}">${esc(msgPreview)}</td>
      <td style="text-align:center;">
        <button class="btn btn-outline" style="font-size:12px;padding:5px 10px;" onclick="openDetail('${r.id}')">
          <i class="fa-solid fa-eye"></i>
        </button>
      </td>
    </tr>`;
  }).join('');

  renderPagination();
}

// ── Pagination ──
function renderPagination() {
  const totalPages = Math.ceil(filteredRecords.length / PAGE_LIMIT);
  const pg = document.getElementById('pagination');

  if (totalPages <= 1) { pg.style.display = 'none'; return; }
  pg.style.display = 'flex';

  const start = (currentPage - 1) * PAGE_LIMIT + 1;
  const end = Math.min(currentPage * PAGE_LIMIT, filteredRecords.length);
  document.getElementById('pageInfo').textContent =
    `${start}–${end} / 전체 ${filteredRecords.length}건`;

  let html = `<button class="page-btn" ${currentPage === 1 ? 'disabled' : ''} onclick="goPage(${currentPage - 1})">
    <i class="fa-solid fa-chevron-left"></i></button>`;

  for (let p = 1; p <= totalPages; p++) {
    if (totalPages > 7 && p > 2 && p < totalPages - 1 && Math.abs(p - currentPage) > 1) {
      if (p === 3 || p === totalPages - 2) html += `<button class="page-btn" disabled>…</button>`;
      continue;
    }
    html += `<button class="page-btn ${p === currentPage ? 'active' : ''}" onclick="goPage(${p})">${p}</button>`;
  }

  html += `<button class="page-btn" ${currentPage === totalPages ? 'disabled' : ''} onclick="goPage(${currentPage + 1})">
    <i class="fa-solid fa-chevron-right"></i></button>`;

  document.getElementById('pageBtns').innerHTML = html;
}

function goPage(p) {
  currentPage = p;
  renderTable();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ── Stats ──
function updateStats() {
  document.getElementById('statTotal').textContent = allRecords.length;

  const today = getPacificDateKey(new Date());
  const todayCount = allRecords.filter(r => {
    const iso = r.submittedAt || r.created_at || null;
    return iso && getPacificDateKey(iso) === today;
  }).length;
  document.getElementById('statToday').textContent = todayCount;

  const finCount = allRecords.filter(r => r.financing === 'yes').length;
  document.getElementById('statFinancing').textContent = finCount;

  const typeCounts = {};
  allRecords.forEach(r => {
    if (r.aduType && r.aduType !== 'unknown' && r.aduType !== '') {
      typeCounts[r.aduType] = (typeCounts[r.aduType] || 0) + 1;
    }
  });
  const topType = Object.entries(typeCounts).sort((a, b) => b[1] - a[1])[0];
  document.getElementById('statTopType').textContent = topType ? aduLabels[topType[0]] : '—';
}

function updateTableCount() {
  const el = document.getElementById('tableCount');
  el.textContent = filteredRecords.length !== allRecords.length
    ? `(필터: ${filteredRecords.length}건 / 전체 ${allRecords.length}건)`
    : `(총 ${allRecords.length}건)`;
}

function updateLastUpdated() {
  document.getElementById('lastUpdated').textContent =
    '마지막 업데이트: ' + new Date().toLocaleTimeString('ko-KR');
}

// ── Detail Modal ──
function openDetail(id) {
  const r = allRecords.find(x => x.id === id);
  if (!r) return;
  activeRecordId = id;

  const dtFull = getDisplayDateFull(r);
  const msgRaw = (r.message || '').replace(/<[^>]*>/g, '') || '내용 없음';

  document.getElementById('detailContent').innerHTML = `
    <div class="detail-item">
      <div class="detail-label">접수 일시</div>
      <div class="detail-value">${dtFull}</div>
    </div>
    <div class="detail-item">
      <div class="detail-label">이름</div>
      <div class="detail-value">${esc(r.name || '—')}</div>
    </div>
    <div class="detail-item">
      <div class="detail-label">연락처</div>
      <div class="detail-value"><a href="tel:${esc(r.phone || '')}">${esc(r.phone || '—')}</a></div>
    </div>
    <div class="detail-item">
      <div class="detail-label">이메일</div>
      <div class="detail-value"><a href="mailto:${esc(r.email || '')}">${esc(r.email || '—')}</a></div>
    </div>
    <div class="detail-item full">
      <div class="detail-label">부지 주소</div>
      <div class="detail-value">${esc(r.address || '—')}</div>
    </div>
    <div class="detail-item">
      <div class="detail-label">ADU 유형</div>
      <div class="detail-value">
        <span class="badge badge-adu-${r.aduType || 'unknown'}">${aduLabels[r.aduType || ''] || '—'}</span>
      </div>
    </div>
    <div class="detail-item">
      <div class="detail-label">예산 범위</div>
      <div class="detail-value">
        <span class="badge badge-budget">${budgetLabels[r.budget || ''] || '—'}</span>
      </div>
    </div>
    <div class="detail-item full">
      <div class="detail-label">융자 상담 관심</div>
      <div class="detail-value">${finLabels[r.financing || ''] || '—'}</div>
    </div>
    <div class="detail-item full">
      <div class="detail-label">추가 문의 내용</div>
      <div class="detail-msg">${esc(msgRaw)}</div>
    </div>
  `;

  document.getElementById('detailModal').classList.add('open');
}

function closeDetail() {
  document.getElementById('detailModal').classList.remove('open');
  activeRecordId = null;
}

// ── Delete ──
async function deleteActiveRecord() {
  showToast('이 관리자 페이지는 현재 읽기 전용입니다. 삭제는 Google Sheets에서 진행해주세요.');
}

// ── CSV 생성 공통 함수 ──
function buildCSV(records) {
  const headers = ['#', '접수일시', '이름', '연락처', '이메일', '부지주소', 'ADU유형', '예산', '융자여부', '추가문의'];
  const rows = records.map((r, i) => [
    i + 1,
    getPacificDateLabel(r.submittedAt || r.created_at || ''),
    r.name || '',
    r.phone || '',
    r.email || '',
    r.address || '',
    aduLabels[r.aduType || ''] || r.aduType || '',
    budgetLabels[r.budget || ''] || r.budget || '',
    finLabels[r.financing || ''] || r.financing || '',
    (r.message || '').replace(/<[^>]*>/g, '').replace(/\n/g, ' ')
  ].map(v => `"${String(v).replace(/"/g, '""')}"`).join(','));
  return '\uFEFF' + [headers.join(','), ...rows].join('\n');
}

function downloadCSV(csvContent, filename) {
  const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

// ── 현재 필터 목록 CSV 내보내기 ──
function exportCSV() {
  if (filteredRecords.length === 0) { showToast('내보낼 데이터가 없습니다.'); return; }
  const today = new Date().toISOString().slice(0, 10);
  downloadCSV(buildCSV(filteredRecords), `alabaster_상담목록_${today}.csv`);
  showToast(`✅ CSV 다운로드 완료 (${filteredRecords.length}건)`);
}

// ── 전체 DB 다운로드 (모든 페이지 포함) ──
async function exportAllDB() {
  const btn = document.getElementById('exportAllBtn');
  btn.disabled = true;
  btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> 불러오는 중...';
  showToast('전체 데이터를 준비하는 중입니다...');

  try {
    if (allRecords.length === 0) {
      showToast('다운로드할 데이터가 없습니다.');
      return;
    }

    const sortedRecords = [...allRecords].sort((a, b) => {
      const ta = new Date(a.submittedAt || a.created_at || 0).getTime();
      const tb = new Date(b.submittedAt || b.created_at || 0).getTime();
      return tb - ta;
    });

    const today = new Date().toISOString().slice(0, 10);
    downloadCSV(buildCSV(sortedRecords), `alabaster_전체DB_${today}.csv`);
    showToast(`✅ 전체 DB 다운로드 완료 (총 ${sortedRecords.length}건)`);
  } catch (err) {
    console.error(err);
    showToast('❌ 다운로드 중 오류가 발생했습니다.');
  } finally {
    btn.disabled = false;
    btn.innerHTML = '<i class="fa-solid fa-database"></i> 전체 DB 다운로드';
  }
}

// ── Sort ──
function handleSort(col) {
  if (sortCol === col) sortDir *= -1;
  else { sortCol = col; sortDir = -1; }

  document.querySelectorAll('thead th').forEach(th => th.classList.remove('sorted'));
  const th = document.querySelector(`thead th[data-col="${col}"]`);
  if (th) {
    th.classList.add('sorted');
    const icon = th.querySelector('.sort-icon');
    if (icon) icon.className = `fa-solid ${sortDir === -1 ? 'fa-sort-down' : 'fa-sort-up'} sort-icon`;
  }
  applyFilters();
}

// ── Helpers ──
function esc(s) {
  return String(s)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;')
    .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function getDisplayDate(r) {
  return getPacificDateLabel(r.submittedAt || r.created_at || '');
}

function getDisplayDateFull(r) {
  return getPacificDateLabel(r.submittedAt || r.created_at || '');
}

function getPacificDateKey(value) {
  try {
    const date = new Date(value);
    if (Number.isNaN(date.getTime())) return '';
    const parts = new Intl.DateTimeFormat('en-CA', {
      timeZone: PACIFIC_TIME_ZONE,
      year: 'numeric',
      month: '2-digit',
      day: '2-digit'
    }).formatToParts(date);
    const year = parts.find(part => part.type === 'year')?.value;
    const month = parts.find(part => part.type === 'month')?.value;
    const day = parts.find(part => part.type === 'day')?.value;
    return year && month && day ? `${year}-${month}-${day}` : '';
  } catch {
    return '';
  }
}

function getPacificDateLabel(value) {
  const key = getPacificDateKey(value);
  return key || '—';
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

// ── Login ──
const ADMIN_ID = 'admin';
const ADMIN_PW = '1234';
const SESSION_KEY = 'alabaster_admin_auth';

function checkLogin() {
  return sessionStorage.getItem(SESSION_KEY) === 'true';
}

function doLogin() {
  const id = document.getElementById('loginId').value.trim();
  const pw = document.getElementById('loginPw').value;
  const errEl = document.getElementById('loginError');

  if (id === ADMIN_ID && pw === ADMIN_PW) {
    sessionStorage.setItem(SESSION_KEY, 'true');
    document.getElementById('loginScreen').classList.add('hidden');
    errEl.classList.remove('show');
    fetchAll();
  } else {
    errEl.classList.add('show');
    document.getElementById('loginPw').value = '';
    document.getElementById('loginPw').focus();
  }
}

function doLogout() {
  sessionStorage.removeItem(SESSION_KEY);
  location.reload();
}

// ── Init ──
document.addEventListener('DOMContentLoaded', () => {
  // Check login session
  if (checkLogin()) {
    document.getElementById('loginScreen').classList.add('hidden');
    fetchAll();
  }

  // Login events (form submit handles Enter key automatically)
  document.getElementById('loginBtn').addEventListener('click', doLogin);

  // Search & Filters
  let debounceTimer;
  document.getElementById('searchInput').addEventListener('input', () => {
    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(applyFilters, 280);
  });
  document.getElementById('filterAduType').addEventListener('change', applyFilters);
  document.getElementById('filterFinancing').addEventListener('change', applyFilters);

  // Toolbar buttons
  document.getElementById('refreshBtn').addEventListener('click', () => {
    fetchAll();
    showToast('새로고침 완료');
  });
  document.getElementById('exportBtn').addEventListener('click', exportCSV);
document.getElementById('exportAllBtn').addEventListener('click', exportAllDB);

  // Modal buttons
  document.getElementById('modalClose').addEventListener('click', closeDetail);
  document.getElementById('modalCloseBtn').addEventListener('click', closeDetail);
  document.getElementById('modalDeleteBtn').addEventListener('click', deleteActiveRecord);
  document.getElementById('modalDeleteBtn').setAttribute('disabled', 'disabled');
  document.getElementById('detailModal').addEventListener('click', e => {
    if (e.target === e.currentTarget) closeDetail();
  });

  // Sort headers
  document.querySelectorAll('thead th[data-col]').forEach(th => {
    th.addEventListener('click', () => handleSort(th.dataset.col));
  });

  // ESC key
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') closeDetail();
  });

  // Auto-refresh every 60s
  setInterval(fetchAll, 60000);
});
</script>
</body>
</html>
